# Site settings
title: Coding Notes
email: hey@thelucasmoore.com
description: >
  Software engineering notes on Ruby, Rails, JavaScript, AWS, and systems thinking.
  Written by Lucas Moore.
baseurl: ""
url: "https://thelucasmoore.github.io"
author: Lucas Moore
twitter_username: thelucasmoore
github_username: thelucasmoore

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives

# jekyll-archives: generates /tags/:name/ and /categories/:name/ pages
jekyll-archives:
  enabled:
    - tags
    - categories
  layout: archive
  permalinks:
    tag: '/tags/:name/'
    category: '/categories/:name/'

# jekyll-feed
feed:
  posts_limit: 20

# jekyll-seo-tag
twitter:
  username: thelucasmoore

# Giscus comments (get values from giscus.app)
giscus:
  repo: TheLucasMoore/thelucasmoore.github.io
  repo_id: "MDEwOlJlcG9zaXRvcnk0OTQ1MzEzNw=="
  category: "General"
  category_id: "DIC_kwDOAvKYUc4C6Gmp"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - ReadMe.md
  - CLAUDE.md
  - .github/

# Default front matter for all posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: Lucas Moore
      comments: true
