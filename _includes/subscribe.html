<section class="subscribe-section">
  <h3>Get new posts by email</h3>
  <p>No spam. Unsubscribe anytime.</p>
  <form
    action="https://buttondown.com/api/emails/embed-subscribe/thelucasmoore"
    method="post"
    target="popupwindow"
    onsubmit="window.open('https://buttondown.com/thelucasmoore', 'popupwindow')"
    class="buttondown-form"
  >
    <input type="email" name="email" placeholder="you@example.com" required>
    <button type="submit">Subscribe</button>
  </form>
</section>
