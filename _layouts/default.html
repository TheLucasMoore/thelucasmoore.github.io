<!DOCTYPE html>
<html lang="en">

  {% include head.html %}

  <body{% if page.next %} data-older-url="{{ page.next.url | relative_url }}"{% endif %}{% if page.previous %} data-newer-url="{{ page.previous.url | relative_url }}"{% endif %}>

    {% include header.html %}

    <main class="page-content" role="main">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}
    {% include dark-mode.html %}
    {% include keyboard-nav.html %}

    <!-- Konami code easter egg -->
    <div id="konami-modal" role="dialog" aria-modal="true" aria-label="Easter egg">
      <div class="konami-dialog">
        <p class="konami-speaker">PROF. OAK:</p>
        <p>Hello there!</p>
        <p>Welcome to the world of</p>
        <p class="konami-title">CODING NOTES!</p>
        <p class="konami-hint">&#x25B6; Press ESC to continue</p>
        <button id="konami-close">OK!</button>
      </div>
    </div>

  </body>

</html>
